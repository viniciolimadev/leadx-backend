services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: leadx_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - leadx_network

  nginx:
    image: nginx:1.27-alpine
    container_name: leadx_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - leadx_network

  postgres:
    image: postgres:16-alpine
    container_name: leadx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leadx_db}
      POSTGRES_USER: ${POSTGRES_USER:-leadx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadx_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leadx} -d ${POSTGRES_DB:-leadx_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadx_network

networks:
  leadx_network:
    driver: bridge

volumes:
  postgres_data:
